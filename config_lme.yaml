data:
  json_path: "data/longmemeval_subset.json"
  sample_ids: null
  limit: null
llm:
  provider: google
  model: gemini-2.5-flash-lite
  temperature: 0
retrievers:
  to_run: ["bm25","tfidf","faiss","knn","svm","time_weighted","nanopq","colbert",
           "multiquery","contextual_compression","self_query"]
